<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="content active" id="home">
        <div class="hero">
            <h1>Welcome to Market Shop</h1>
            <p>Get the freshest vegetables and fruit delivered to your door.</p>
            <button id="homeShopBtn" class="home-now-but">Shop now</button>
        </div>
    </div>

    <div class="content" id="shop">

        <div class="filter-buttons">
            <button onclick="filterProducts('all')">All</button>
            <button onclick="filterProducts('vegetables')">Vegetables</button>
            <button onclick="filterProducts('meat')">Meat</button>
            <button onclick="filterProducts('fruits')">Fruit</button>
            <button onclick="filterProducts('drink')">Drink</button>
        </div>

        <input type="text" placeholder="Search product" class="search-box">

        <div class="shop-grid">
            <div class="product-card" data-category="vegetables">
                <img src="tomato.webp" alt="Tomato" class="product-img">
                <p class="product-caption">Tomato</p>
                <p class="product-price">6.50₾</p>
                <button class="add-but" data-name="Tomato" data-price="6.50">add basket</button>
            </div>
            <div class="product-card" data-category="vegetables">
                <img src="carrot.webp" alt="Carrot" class="product-img">
                <p class="product-caption">Carrot</p>
                <p class="product-price">1.80₾</p>
                <button class="add-but" data-name="carrot" data-price="1.80">add basket</button>
            </div>
            <div class="product-card" data-category="vegetables">
                <img src="cucumber.webp" alt="Cucumber" class="product-img">
                <p class="product-caption">Cucumber</p>
                <p class="product-price">4.50₾</p>
                <button class="add-but" data-name="cucumber" data-price="4.50">add basket</button>
            </div>
            <div class="product-card" data-category="vegetables">
                <img src="pepper.webp" alt="Pepper" class="product-img">
                <p class="product-caption">Pepper</p>
                <p class="product-price">10.00₾</p>
                <button class="add-but" data-name="pepper" data-price="10.00">add basket</button>
            </div>
            <div class="product-card" data-category="vegetables">
                <img src="onion.webp" alt="Onion" class="product-img">
                <p class="product-caption">Onion</p>
                <p class="product-price">1.50₾</p>
                <button class="add-but" data-name="onion" data-price="1.50">add basket</button>
            </div>
            <div class="product-card" data-category="vegetables">
                <img src="broccoli.webp" alt="Broccoli" class="product-img">
                <p class="product-caption">Broccoli</p>
                <p class="product-price">8.00₾</p>
                <button class="add-but" data-name="broccoli" data-price="8.00">add basket</button>
            </div>
            <div class="product-card" data-category="fruits">
                <img src="banana.webp" alt="Banana" class="product-img">
                <p class="product-caption">Banana</p>
                <p class="product-price">4.50₾</p>
                <button class="add-but" data-name="banana" data-price="4.50">add basket</button>
            </div>
            <div class="product-card" data-category="drink">
                <img src="coca-cola.webp" alt="Coca-cola" class="product-img">
                <p class="product-caption">Coca-cola</p>
                <p class="product-price">1.60₾</p>
                <button class="add-but" data-name="coca-cola" data-price="1.60">add basket</button>
            </div>
            <div class="product-card" data-category="fruit">
                <img src="apple.webp" alt="Apple" class="product-img">
                <p class="product-caption">Apple</p>
                <p class="product-price">1.50₾</p>
                <button class="add-but" data-name="apple" data-price="1.50">add basket</button>
            </div>
        </div>
        
    </div>

    <div class="content" id="buy">
        <div class="buy-container">
            <h2>Your Basket</h2>
            <div id="basketList" class="basket-grid">
                </div>
            <div class="basket-summary">
                <h3 id="totalPrice">Total: ₾0.00</h3>
                <button id="openPayment" class="pay-now-but">Proceed to Payment</button>
            </div>
        </div>
    </div>

    <div class="modal" id="paymentModal">
        <div class="modal-content">
            <span class="close-but">&times;</span>
            <h2>Payment</h2>

            <input type="text" placeholder="Card Number">
            <input type="text" placeholder="Card Holder Name">
            <input type="text" placeholder="MM/YY">
            <input type="text" placeholder="CVV">

            <button class="pay-but">Pay</button>
        </div>
        
    </div>

    <div class="nav-bar">
        <button class="nav-but active" data-target="home">home</button>
        <button class="nav-but" data-target="shop">shop</button>
        <button class="nav-but" data-target="buy">buy</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
